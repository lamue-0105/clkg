<script type="text/markdown" id="src"># 文化景观知识图谱（CLKG）阶段成果报告

**报告期间**：2026-05-17 至 2026-05-18（两日推进）  
**阶段定位**：数据收集 + 整合 + 融合阶段（主线 ~85% 完成）

---

## 摘要

历时两个工作日，CLKG 项目完成从**&quot;零代码&quot;到&quot;可演示的多模态多项目知识基础设施&quot;**的全过程：
- 决定并落地 PostgreSQL + Python 双层架构（替换原定 MLSQL 方案）
- 搭建 schema 治理工程工具链（init / verify / dump_schema / check）
- 完成 **3 个遗产项目的端到端入库**：木斯塘、侨批、新疆
- 实现**多源多模态融合**：表格 + 照片 + GIS + ArcGIS GDB
- 实现**空间推断管道**：自动生成&quot;文化景观单元↔遗产点&quot;层级关系
- 实现**数据质量审计工作流**：识别并修正录入偏差

**当前规模**：**~35,000 个语义实体 / ~480,000 条 RDF-Star 三元组**，全部按统一 CL-Onto 本体组织。

---

## 一、架构决策记录

| 决策点 | 选择 | 理由 |
|---|---|---|
| ETL 层 | **Python**（替换原定 MLSQL） | 多模态生态压倒性优势；研究级数据量 Python 完全够用；与 Anaconda 工作环境零摩擦 |
| 存储 | **PostgreSQL + PostGIS** | 事务、索引、空间能力一应俱全；4D-fluents 直接由 valid_time 字段表达 |
| 本体模型 | **三表 + statement-based**（替换 7-Class 设计） | RDF schema-less 思想；新增字段不动表结构；扁平表达更易查询，导出 RDF 时再展开 |
| PID 体系 | `clkg:{region}:{type}-{temporal}-{serial}`，按需建序列 | 区域无关；新项目零运维；机构维度暂不引入 |
| 多模态融合策略 | 单 staging 缓冲 + ingest_batch() 存储过程 | 事务边界单一；MLSQL/Python 写 staging 即可，PG 自动晋升 |

---

## 二、工程基础设施

### 2.1 PG 侧（5 个 SQL 文件，每个区域库都跑这套）

```
sql/00_create_schema.sql    业务表 schema（auto-extracted, 单一真相源）
sql/01_staging.sql           staging schema + ingest_audit
sql/02_pid_minter.sql        PID 序列 + resolve_or_mint_pid (SECURITY DEFINER)
sql/03_ingest_batch.sql      ingest_batch() 存储过程
sql/04_grants.sql            mlsql_writer 角色 + 权限
```

### 2.2 Python 包（ingest/）

```
ingest/
├── config.py            env 配置
├── db.py                PG 连接 + 健康检查
├── staging.py           StatementRow + write_rows + trigger_ingest_batch
├── schema.py            反向导出 schema 工具
├── spatial.py           ST_Contains 空间推断
├── connectors/
│   ├── tabular.py       Mustang heritage CSV
│   ├── photo_table.py   照片元数据表（已含 GPS）
│   ├── images.py        EXIF/GPS 自取（备用）
│   ├── shapefile.py     通用 SHP/GDB（geopandas）
│   ├── xinjiang.py      新疆三普 xlsx
│   └── qiaopi.py        侨批 xlsx
├── extractors/
│   └── qwen_ner.py      通义千问 NER（默认关，缓存）
├── pipelines/
│   ├── mustang.py
│   ├── qiaopi.py
│   └── xinjiang.py
├── cli.py               所有命令入口
└── watchfolder.py       自动监听
```

### 2.3 CLI 工具集（&quot;30 秒接新项目&quot;的工程能力）

| 命令 | 一句话功能 |
|---|---|
| `init &lt;region&gt;` | CREATE DATABASE + 应用 5 个 SQL = 一行建好新项目库 |
| `dump_schema &lt;region&gt;` | 反向导出 schema → 00_create_schema.sql（单一真相源） |
| `verify &lt;region&gt;` | 跨库 schema 飘移检测 |
| `check &lt;region&gt;` | 健康检查 |
| `mustang/qiaopi/xinjiang` | 项目端到端摄取 |

## 五、可演示的数据洞察

### 5.1 数据质量审计（KG 的杀手锏）

在录入完成后**自动浮现**的录入偏差：

```
Mustang 类型字段（12 类官方本体 vs 实际录入）：
  寺院 64 → 应规范化为 寺庙
  寺院建筑 4 → 寺庙
  高程 36 → 高程点
  洞穴寺院 7 → 洞穴寺庙
  宫殿 2 → 王宫
  其他 2 → 疑点
  
Layer 字段（3 种官方值 vs 实际）：
  高程 18 ← 类型值错填到了 Layer 列

合计 132 条录入偏差，通过单条 SQL 一键修复。
```

### 5.2 空间层级自动发现

```
Mustang polygon CLU &quot;pl-unk-0000268&quot; 包含 68 个 feature：
  - Lo Royal Palace (王宫)
  - Thugchen / Jampa / Chode Gompa (三大寺院)
  - Lomanthang 4 角的角楼
  - Big Route Chorten
  - Lomanthang Gate Mani Wall
  - 6 段城墙细部 (墙角 1-6)
  
→ KG 无任何先验知识，纯粹用 ST_Contains 自动识别出
  &quot;洛曼塘古城 = 这堆遗存的容器&quot;
```

### 5.3 跨年代田野调研路线还原

```
基于 6036 张带 GPS+时间戳的照片，自动复原 2024-09 田野的小时级路线：
  2024-09-22 09:00 → Lomanthang 区域开拍
  2024-09-22 13:00 → 移动到 Chhoser
  2024-09-22 19:00 → 北上至 Ghemi 营地
  ...

并对比 2000 / 2018 / 2019 三次旧田野的空间分布差异。
```

### 5.4 资金流网络（侨批）

```
13578 封侨批的网络分析能力：
  - 同一寄信人在多封信中的身份关联（resolve_or_mint_pid 自动合并）
  - 货币 + 金额 + 时间 → 资金流时空轨迹
  - 收件地标准化 + lat/lon → 侨乡地理分布
```

### 5.5 历史厚度分布（新疆）

```
3027 古遗址按朝代分布：
  清 601、唐 260、汉至魏晋 206、唐至宋 113...
  「唐周边」（南北朝至唐、汉至唐、唐至宋等）合计 ~530 → 验证新疆历史繁盛期
  「待定」370 (12.2%) → 学术研究空白点
  「青铜+早铁+新石器」140+ → 史前史厚度
```

## 六、当前限制（坦诚清单）

| 缺什么 | 影响 | 难度 | 优先级 |
|---|---|---|---|
| Qwen NER 没启用 | 缺自动实体抽取 | 低（拿 key 即可） | 🔴 短期 |
| OCR pipeline 没建 | 信件正文、扫描件未数字化 | 高 | 🔴 中期最大杠杆 |
| 跨项目实体共指消解 | &quot;Lo Royal Palace × 2&quot; 类问题，将随项目数线性增长 | 高（需要人工审核工作流） | 🟠 中期 |
| 新疆三普 ↔ 文保数据按名匹配 | 让三普表获得坐标 | 中 | 🟠 中期 |
| 24/7 watchfolder 自动入库 | &quot;丢进来就自动&quot;还需要监听器 + 智能路由 | 中 | 🟡 中期 |
| RDF 导出 + SPARQL endpoint | 不能接入国际遗产数据网络 | 中（1-2 天） | 🟡 中期 |
| 形式化 CL-Onto 本体（OWL/TTL） | 学术发表 / 国际兼容 | 高 | 🟢 长期 |
| 公共查询界面 | 别人无法使用 | 中 | 🟢 长期 |

## 八、下阶段优先级建议

### 🥇 第一优先：开 Qwen NER（拿到 key 后 5 分钟）

立刻能在以下字段抽取实体：
- Mustang `hasDescription`（&quot;一个庞大的洞穴群落，错落为5层...&quot;）
- 新疆 `简介` / `环境状况` / `备注 2`
- 侨批 `title` / `notes`

### 🥈 第二优先：跨数据源融合（**新疆三普 ↔ 文保**）

按文物保护单位**名称匹配**给三普表 3027 行补坐标——可让缺坐标的旧普查数据**地图化**。需要：
- 编辑距离 / fuzzy match
- 同名候选评分
- 人工 confirm（用 entity_match_candidates 表 + Jupyter notebook 审核流）

### 🥉 第三优先：OCR pipeline 启动（侨批扫描件）

最大杠杆点。试 PaddleOCR + Qwen 后处理：
- 选 10 张试点 → 100 张 → 1000 张
- 信件正文 → NER → 实体关系网络爆炸式增长

### 🏅 第四优先：RDF 导出 + SPARQL endpoint

把 KG 推向&quot;国际学术可用&quot;形态。
