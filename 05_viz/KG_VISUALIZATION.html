  :root {
    --bg: #fafafa;

    --muted: #57606a;

  * { box-sizing: border-box; }
  body {

    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 24px;
  }
  header h1 { margin: 0; font-size: 18px; }
  header .sub { font-size: 12px; color: var(--muted); }
  nav { display: flex; gap: 4px; padding: 8px 24px; background: var(--panel);
        border-bottom: 1px solid var(--border); }
  nav button {
    padding: 8px 16px; border: 1px solid var(--border); background: #fff;
    cursor: pointer; font-size: 13px; border-radius: 6px;
    font-family: inherit; color: var(--text);
  }
  nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  nav button:hover:not(.active) { background: #f6f8fa; }
  main { flex: 1; display: flex; min-height: 0; }
  #graph { flex: 1; background: var(--bg); position: relative; }
  aside {
    width: 320px; background: var(--panel); border-left: 1px solid var(--border);
    padding: 18px 22px; overflow-y: auto; font-size: 13px; line-height: 1.6;
  }
  aside h2 { font-size: 15px; margin: 0 0 8px 0; }
  aside h3 { font-size: 13px; margin: 16px 0 6px 0; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  aside ul { padding-left: 18px; margin: 6px 0; }
  aside li { margin: 4px 0; }
  aside code { background: #f6f8fa; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
  aside .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #eee; }
  aside .stat b { color: var(--accent); }
  .legend { font-size: 12px; padding: 8px 0; }
  .legend .dot {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    vertical-align: middle; margin-right: 6px;
  }
  footer { padding: 6px 24px; background: var(--panel); border-top: 1px solid var(--border);
           font-size: 11px; color: var(--muted); }
</style>

  // ============================== Scene 1 ==============================
  1: {
    title: "Lo Manthang field 文化景观单元",
    panel: () => {
      const p = DATA.lomanthang.parent;
      const unique = new Map();
      DATA.lomanthang.children.forEach(c => unique.set(c.pid, c));
      const childTypes = {};
      [...unique.values()].forEach(c => {
        const t = c.hasType || "unknown";
        childTypes[t] = (childTypes[t] || 0) + 1;
      });
      const sortedTypes = Object.entries(childTypes).sort((a,b)=>b[1]-a[1]);
      return `
        <h2>📍 ${p.label}</h2>
        <div class="stat"><span>PID</span><b>${p.pid.split(':').pop()}</b></div>
        <div class="stat"><span>语句记录子要素数</span><b>${p.n} 条 containsPlace</b></div>
        <div class="stat"><span>去重后子实体</span><b>${unique.size} 个</b></div>

        <h3>子要素类型分布</h3>
        <ul>${sortedTypes.map(([t,n])=>`<li><b>${t}</b> × ${n}</li>`).join('')}</ul>

        <h3>故事</h3>
        <p>未人工标注 — PostGIS <code>ST_Contains(polygon, point)</code>
        从空间关系<b>自动浮现</b>这组聚类。这是 CL-Onto "文化景观单元 (CLU)"
        从几何关系反推语义关系的具体实现。</p>

        <h3>学术意义</h3>
        <p>UNESCO 文化景观概念强调"作为整体被感知";
        本场景把"整体"具象化为可计算的<b>1 父节点 → N 子节点</b>结构,
        为后续景观尺度分析 (community detection / 多尺度聚合) 奠定基础。</p>
      `;
    },
    build: () => {
      const nodes = [], edges = [];
      const p = DATA.lomanthang.parent;
      nodes.push({
        id: p.pid, label: p.label,
        shape: "diamond", size: 38, color: "#b8860b",
        font: { size: 18, color: "#fff", strokeWidth: 0, bold: true },
        title: `CLU: ${p.label}\nPID: ${p.pid}\n子要素: ${p.n}`,
      });
      const colorMap = {
        "佛塔": "#7c3aed", "寺庙": "#dc2626", "王宫": "#b8860b",
        "民居": "#0891b2", "城墙": "#525252", "聚落": "#16a34a",
        "公共建筑": "#ea580c", "墓地": "#374151",
      };
      const seen = new Set();
      DATA.lomanthang.children.forEach(c => {
        if (seen.has(c.pid)) return;
        seen.add(c.pid);
        const t = c.hasType || "其他";
        nodes.push({
          id: c.pid, label: c.label.slice(0, 14),
          shape: "dot", size: 14,
          color: colorMap[t] || "#9ca3af",
          font: { size: 11, color: "#1f2328" },
          title: `${c.label}\nType: ${t}\nPID: ${c.pid}`,
        });
        edges.push({
          from: p.pid, to: c.pid, color: "#d0d7de",
          width: 1, smooth: { type: "continuous" },
        });
      });
      return { nodes, edges };
    },
    physics: { enabled: true, stabilization: { iterations: 200 },
               solver: "forceAtlas2Based",
               forceAtlas2Based: { gravitationalConstant: -80, springLength: 60 } },
  },

  // ============================== Scene 2 ==============================
  2: {
    title: "新疆 3 处世界级遗产 (丝路廊道申遗组成)",
    panel: () => {
      const sites = DATA.xinjiang_world.sites;
      return `
        <h2>🏛 新疆 3 处世界级遗产</h2>
        <p>从 <b>5409</b> 个文保单位中, 用单条 <code>WHERE predicate='hasHeritageLevel' AND object_value LIKE '%世界级%'</code>
        准确钓出的 3 处 — 全部是"丝绸之路: 长安—天山廊道路网"申遗组成部分。</p>

        <h3>遗产清单</h3>
        ${sites.map(s => `
          <div style="margin: 10px 0; padding: 10px; background:#fff8e1; border-left: 3px solid var(--gold); border-radius: 4px;">
            <b style="font-size:14px">${s.name || '(未命名)'}</b><br/>
            <span style="color:var(--muted);font-size:12px">
              ${[s.prefecture, s.county].filter(Boolean).join(' / ')} · ${s.era || '?'} · ${s.batch || '?'}
            </span>
          </div>
        `).join('')}

        <h3>学术意义</h3>
        <p>三个名字, 在丝绸之路考古学界都是核心节点 — KG 自动从 5409 条文保中
        把它们准确识别出来, 等于自动印证了申遗体系的知识结构。
        是<b>"字符串属性 → 学术结论"</b>的语义距离压缩。</p>

        <h3>结构</h3>
        <p>中心 = "世界级"语义锚, 三处遗产挂在锚下,
        每处遗产再向外辐射出 <i>name / county / era / batch</i> 四类属性 — 这就是
        RDF-star 语句级三元组的可视化形态。</p>
      `;
    },
    build: () => {
      const nodes = [], edges = [];
      // 中心锚
      nodes.push({
        id: "anchor", label: "世界级遗产", shape: "star", size: 40,
        color: "#b8860b",
        font: { size: 16, color: "#fff", strokeWidth: 0, bold: true },
        title: "查询锚点: hasHeritageLevel='世界级'",
      });
      DATA.xinjiang_world.sites.forEach((s, i) => {
        nodes.push({
          id: s.pid, label: s.name || `Site ${i+1}`,
          shape: "hexagon", size: 30,
          color: { background: "#dc2626", border: "#7f1d1d" },
          font: { size: 14, color: "#fff", strokeWidth: 0, bold: true },
          title: `${s.name}\n县: ${s.county}\n州: ${s.prefecture}\n年代: ${s.era}\n批次: ${s.batch}`,
        });
        edges.push({ from: "anchor", to: s.pid, color: "#b8860b", width: 2 });

        // 属性辐射
        const attrs = [
          ["county",  s.county,     "🏘 县",       "#10b981"],
          ["era",     s.era,        "📅 年代",     "#3b82f6"],
          ["batch",   s.batch,      "📜 批次",     "#8b5cf6"],
          ["prefecture", s.prefecture, "🗺 州",    "#f59e0b"],
        ];
        attrs.forEach(([k, v, lbl, c]) => {
          if (!v) return;
          const aid = `${s.pid}::${k}::${v}`;
          nodes.push({
            id: aid, label: v, shape: "box",
            color: { background: "#fff", border: c },
            font: { size: 11, color: c },
            margin: 6,
            title: `${lbl}: ${v}`,
          });
          edges.push({
            from: s.pid, to: aid,
            label: k, font: { size: 9, color: "#888", strokeWidth: 0, align: "middle" },
            color: c, width: 1, dashes: true,
          });
        });
      });
      return { nodes, edges };
    },
    physics: { enabled: true, stabilization: { iterations: 200 },
               solver: "forceAtlas2Based",
               forceAtlas2Based: { gravitationalConstant: -100, springLength: 80 } },
  },

  // ============================== Scene 3 ==============================
  3: {
    title: "三库本体类型全景",
    panel: () => {
      const s = DATA.regions.summary;
      const total_e = Object.values(s).reduce((a,b)=>a+b.entities, 0);
      const total_s = Object.values(s).reduce((a,b)=>a+b.statements, 0);
      return `
        <h2>🌐 三库全景</h2>
        <p>三个区域 × 六种 CL-Onto 实体类型, 节点面积按实体数对数缩放。
        节点中心点是区域总规模, 外圈是该区域下各 entity_type 的子集。</p>

        <h3>合计</h3>
        <div class="stat"><span>实体总数</span><b>${total_e.toLocaleString()}</b></div>
        <div class="stat"><span>语句总数</span><b>${total_s.toLocaleString()}</b></div>

        <h3>按区域</h3>
        ${Object.entries(s).map(([r, st]) => `
          <div class="stat"><span>${r}</span>
            <b>${st.entities.toLocaleString()} · ${st.statements.toLocaleString()}</b></div>
        `).join('')}

        <h3>类型语义</h3>
        <ul>
          <li><b>pl</b> Place — 原子地点</li>
          <li><b>clu</b> CulturalLandscapeUnit — 文化景观单元 ★</li>
          <li><b>ac</b> Actor — 人物 / 机构</li>
          <li><b>doc</b> Document — 文献 / 档案</li>
          <li><b>img</b> DigitalImage — 数字影像</li>
          <li><b>ev</b> Event — 事件</li>
        </ul>

        <h3>解读</h3>
        <p><b>mustang</b> 三模态 (pl + clu + img) — 高原考古多源融合;
        <b>qiaopi</b> doc + ac 主导 — 文献+人物的家书纽带;
        <b>xinjiang</b> 几乎全 pl — 大规模考古点列表。
        同一 CL-Onto 类型体系能同时容纳三种异构语境, 是框架普适性的视觉证据。</p>
      `;
    },
    build: () => {
      const nodes = [], edges = [];
      const colorMap = {
        pl:"#3b82f6", clu:"#b8860b", ac:"#10b981",
        doc:"#8b5cf6", img:"#ef4444", ev:"#f97316",
      };
      const regionColor = { mustang:"#dc2626", qiaopi:"#0891b2", xinjiang:"#7c3aed" };
      const regionLabel = { mustang:"木斯塘 Mustang", qiaopi:"侨批 Qiaopi", xinjiang:"新疆 Xinjiang" };

      Object.entries(DATA.regions.summary).forEach(([region, sum]) => {
        const rid = `region:${region}`;
        const size = Math.log10(sum.entities) * 14;
        nodes.push({
          id: rid, label: regionLabel[region],
          shape: "circle", size,
          color: { background: regionColor[region], border: "#1f2328" },
          font: { size: 18, color: "#fff", strokeWidth: 0, bold: true },
          title: `${region}\n${sum.entities.toLocaleString()} 实体\n${sum.statements.toLocaleString()} 语句`,
        });
        DATA.regions.dist[region].forEach(d => {
          const tid = `${region}::${d.type}`;
          const tsize = Math.max(8, Math.log10(d.n+1) * 8);
          nodes.push({
            id: tid, label: `${d.type}\n${d.n}`,
            shape: "dot", size: tsize,
            color: colorMap[d.type] || "#9ca3af",
            font: { size: 11, color: "#1f2328", multi: true },
            title: `${region} / ${d.type}: ${d.n} 个实体`,
          });
          edges.push({
            from: rid, to: tid, color: "#d0d7de", width: 1,
          });
        });
      });
      return { nodes, edges };
    },
    physics: { enabled: true, stabilization: { iterations: 250 },
               solver: "forceAtlas2Based",
               forceAtlas2Based: { gravitationalConstant: -200, springLength: 120,
                                   centralGravity: 0.01 } },
  },
};

// ============================== Render ==============================
let network = null;

function render(sceneId) {
  const scene = scenes[sceneId];
  const { nodes, edges } = scene.build();
  const container = document.getElementById("graph");
  if (network) network.destroy();
  network = new vis.Network(
    container,
    { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) },
    {
      nodes: { borderWidth: 1, shadow: false },
      edges: { smooth: { type: "dynamic" }, shadow: false },
      physics: scene.physics,
      interaction: { hover: true, tooltipDelay: 100 },
    }
  );
  // 稳定后停物理引擎
  network.once("stabilizationIterationsDone", () => {
    network.setOptions({ physics: false });
  });
  document.getElementById("panel").innerHTML = scene.panel();
}

document.querySelectorAll("nav button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render(btn.dataset.scene);
  });
});

render(1);
</script>
</body>
</html>
